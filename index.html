<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辩论赛投票</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 1rem; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); min-height: 60vh; }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem; }
        
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; color: #dc2626; font-size: 1.05rem; }
        input[type="text"] { width: 100%; padding: 0.8rem; border: 2px solid #cbd5e1; border-radius: 0.5rem; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #3b82f6; outline: none; }
        
        button { width: 100%; padding: 0.8rem; border: none; border-radius: 0.5rem; background: #3b82f6; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .radio-option { display: block; padding: 1rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; margin-bottom: 0.8rem; cursor: pointer; transition: 0.2s; }
        .radio-option:hover { background: #f1f5f9; }
        input[type="radio"] { margin-right: 10px; transform: scale(1.2); }
        
        .waiting-msg { text-align: center; color: #d97706; font-size: 1.2rem; font-weight: bold; padding: 1rem 0; }
        .hidden { display: none; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid #e2e8f0; }
        .btn-logout { width: auto; padding: 0.4rem 0.8rem; background: #ef4444; font-size: 0.85rem; border-radius: 0.4rem; }
        .btn-logout:hover { background: #dc2626; }
        
        .vote-success-card { padding: 1.5rem 0; text-align: center; }
        .vote-success-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .vote-success-title { font-size: 1.1rem; margin-bottom: 0.5rem; font-weight: bold; }
        .vote-success-target { font-size: 1.4rem; font-weight: bold; color: #0f172a; margin-bottom: 1.5rem; background: #f1f5f9; padding: 1rem; border-radius: 0.5rem; display: inline-block; width: 100%; box-sizing: border-box;}
        .vote-success-footer { font-size: 1.05rem; color: #64748b; font-weight: normal; border-top: 1px dashed #cbd5e1; padding-top: 1.5rem; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎤 辩论赛现场投票</h2>
    
    <div id="loginSection">
        <div class="form-group">
            <label>❗️ 请先输入您的姓名，才可以查看并参与投票：</label>
            <input type="text" id="voterName" placeholder="例如：张三">
        </div>
        <button onclick="login()">验证并进入</button>
        <p id="loginError" style="color: red; text-align: center; margin-top: 1rem; display: none; font-weight: bold;"></p>
    </div>

    <div id="votingSection" class="hidden">
        <div class="header-bar">
            <span style="font-size: 0.85rem; color: #64748b;">当前投票人: <strong id="displayUserName" style="color:#0f172a; font-size:1rem;"></strong></span>
            <button class="btn-logout" onclick="logout()">🔄 修改姓名</button>
        </div>
        
        <div id="dynamicContent">
            <div class="waiting-msg">⏳ 正在同步赛事状态...</div>
        </div>
    </div>
</div>

<script>
    const API_CONFIGS = [
        { apiKey: "$2a$10$J.nzDSD1igPJF/7QuiBE8.W8N/6O3wwPYi3dvNZ5xTO3tfu9XP.ZC", binId: "69c6e9f0aa77b81da9286fee" },
        { apiKey: "$2a$10$KFcTvvnVuwIivhUsGq8.z.pmXNh4Z9v/CkRxBRwj9zG2JebPaBcg6", binId: "69c6fdadc3097a1dd569be7c" }
    ];

    let currentUser = ""; 
    let appData = {};
    let syncTimer = null;

    async function requestWithFallback(method, data = null) {
        for (let cfg of API_CONFIGS) {
            try {
                if (method === 'GET') {
                    const resp = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, { headers: { 'X-Master-Key': cfg.apiKey } });
                    if (resp.ok) { const result = await resp.json(); return { success: true, data: result.record }; }
                } else {
                    const resp = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': cfg.apiKey }, body: JSON.stringify(data) });
                    if (resp.ok) return { success: true };
                }
            } catch(e) { console.warn("API Error:", e); }
        }
        return { success: false };
    }

    async function login() {
        const nameInput = document.getElementById("voterName").value.trim();
        const errObj = document.getElementById("loginError");
        errObj.style.display = "none";

        if (!nameInput) {
            errObj.innerText = "❗️ 姓名不能为空，请输入姓名！";
            errObj.style.display = "block";
            return;
        }
        
        const btn = document.querySelector("#loginSection button");
        btn.innerText = "连接中..."; btn.disabled = true;

        const res = await requestWithFallback('GET');
        btn.innerText = "验证并进入"; btn.disabled = false;

        if (res.success && res.data) {
            appData = res.data;
            const allowed = appData.allowedVoters || [];
            if (allowed.length > 0 && !allowed.includes(nameInput)) {
                errObj.innerText = "❗️ 抱歉，您的姓名不在本次投票白名单中。";
                errObj.style.display = "block";
                return;
            }
            currentUser = nameInput;
            showVotingSection();
        } else {
            errObj.innerText = "❗️ 网络连接失败，请重试";
            errObj.style.display = "block";
        }
    }

    function logout() {
        currentUser = "";
        document.getElementById("votingSection").classList.add("hidden");
        document.getElementById("loginSection").classList.remove("hidden");
        document.getElementById("voterName").value = "";
        document.getElementById("loginError").style.display = "none";
        if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
    }

    function showVotingSection() {
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("votingSection").classList.remove("hidden");
        document.getElementById("displayUserName").innerText = currentUser;
        renderVotingUI();
        startPolling();
    }

    function renderVotingUI() {
        const content = document.getElementById("dynamicContent");
        const phase = appData.phase || "waiting";

        if (phase === "waiting") {
            // 这是修改后的等待界面，加上了横线和“结果将在会议中公布”
            content.innerHTML = `
                <div class="waiting-msg" style="padding-top: 2rem;">
                    <div style="font-size: 3rem; margin-bottom: 0.5rem;">⏳</div>
                    当前未开启投票<br>
                    <span style="font-size:0.9rem; color:#64748b; font-weight:normal; display:inline-block; margin-top:0.5rem;">请等待管理员操作...</span>
                    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px dashed #cbd5e1; font-size: 1.05rem; color: #64748b; font-weight: normal; letter-spacing: 1px;">
                        📢 结果将在会议中公布
                    </div>
                </div>`;
            return;
        }

        let html = "";
        
        if (phase === "debateVoting") {
            const myVoteKey = (appData.debateVotes || {})[currentUser];
            if (myVoteKey) {
                const pos = (appData.positions || []).find(p => p.key === myVoteKey);
                const targetText = pos ? `${pos.label} - ${pos.name}` : myVoteKey;
                content.innerHTML = `
                    <div class="vote-success-card">
                        <div class="vote-success-icon">✅</div>
                        <div class="vote-success-title" style="color:#2563eb;">您已成功完成【🏆 最佳辩手】投票</div>
                        <div style="font-size:0.9rem; color:#64748b; margin-bottom:0.8rem;">您的投票对象是：</div>
                        <div class="vote-success-target">${targetText}</div>
                        <div class="vote-success-footer">📢 结果将在会议中公布</div>
                    </div>`; 
                return;
            }
            html += `<h3 style="color:#2563eb; margin-bottom:1rem;">🏆 评选最佳辩手</h3>`;
            appData.positions.forEach(pos => {
                if(pos.name) html += `<label class="radio-option"><input type="radio" name="vote" value="${pos.key}"> ${pos.label} - <b>${pos.name}</b></label>`;
            });
            html += `<button onclick="submitVote('debateVotes', getRadioValue('vote'))" style="margin-top:1rem;">确认投票</button>`;
        } 
        else if (phase === "pkVoting") {
            const myPkVote = (appData.pkVotes || {})[currentUser];
            if (myPkVote) {
                const pos = (appData.positions || []).find(p => p.key === myPkVote);
                const targetText = pos ? `${pos.label} - ${pos.name}` : myPkVote;
                content.innerHTML = `
                    <div class="vote-success-card">
                        <div class="vote-success-icon">✅</div>
                        <div class="vote-success-title" style="color:#d97706;">您已成功完成【⚔️ 平票加赛(PK)】投票</div>
                        <div style="font-size:0.9rem; color:#64748b; margin-bottom:0.8rem;">您的投票对象是：</div>
                        <div class="vote-success-target">${targetText}</div>
                        <div class="vote-success-footer">📢 结果将在会议中公布</div>
                    </div>`; 
                return;
            }
            html += `<h3 style="color:#d97706; margin-bottom:1rem;">⚔️ 平票加赛 (PK)</h3>`;
            (appData.tieCandidates || []).forEach(candKey => {
                const pos = appData.positions.find(p => p.key === candKey);
                if(pos && pos.name) html += `<label class="radio-option"><input type="radio" name="vote" value="${pos.key}"> ${pos.label} - <b>${pos.name}</b></label>`;
            });
            html += `<button onclick="submitVote('pkVotes', getRadioValue('vote'))" style="margin-top:1rem; background:#f59e0b;">确认投票</button>`;
        }
        else if (phase === "winnerVoting") {
            const myWinnerVote = (appData.winnerVotes || {})[currentUser];
            if (myWinnerVote) {
                const targetText = myWinnerVote === 'pro' ? '正方 胜' : '反方 胜';
                content.innerHTML = `
                    <div class="vote-success-card">
                        <div class="vote-success-icon">✅</div>
                        <div class="vote-success-title" style="color:#166534;">您已成功完成【🏅 胜负方】投票</div>
                        <div style="font-size:0.9rem; color:#64748b; margin-bottom:0.8rem;">您的投票对象是：</div>
                        <div class="vote-success-target">${targetText}</div>
                        <div class="vote-success-footer">📢 结果将在会议中公布</div>
                    </div>`; 
                return;
            }
            html += `<h3 style="color:#166534; margin-bottom:1rem;">🏅 评选获胜方</h3>`;
            html += `<label class="radio-option"><input type="radio" name="vote" value="pro"> 正方 胜</label>`;
            html += `<label class="radio-option"><input type="radio" name="vote" value="con"> 反方 胜</label>`;
            html += `<button onclick="submitVote('winnerVotes', getRadioValue('vote'))" style="margin-top:1rem; background:#166534;">确认投票</button>`;
        }
        else if (phase === "topicVoting") {
            const myTopicVotes = [];
            (appData.topics || []).forEach(t => {
                const voteVal = (appData.topicVotes && appData.topicVotes[t.id]) ? appData.topicVotes[t.id][currentUser] : null;
                if (voteVal) {
                    let valText = voteVal === 'agree' ? '<span style="color:#166534;">赞成</span>' : (voteVal === 'disagree' ? '<span style="color:#dc2626;">反对</span>' : '<span style="color:#64748b;">弃权</span>');
                    myTopicVotes.push(`<div style="font-size:0.95rem; color:#334155; margin-bottom:0.5rem; border-bottom:1px solid #e2e8f0; padding-bottom:0.5rem; text-align:left;">${t.title}：<strong>${valText}</strong></div>`);
                }
            });
            
            if (myTopicVotes.length > 0) {
                content.innerHTML = `
                    <div class="vote-success-card">
                        <div class="vote-success-icon">✅</div>
                        <div class="vote-success-title" style="color:#475569;">您已成功完成【📋 辩题表决】</div>
                        <div style="font-size:0.9rem; color:#64748b; margin-bottom:0.8rem;">您的表决结果：</div>
                        <div class="vote-success-target" style="padding:1rem; font-size:1rem;">
                            ${myTopicVotes.join('')}
                        </div>
                        <div class="vote-success-footer">📢 结果将在会议中公布</div>
                    </div>`; 
                return;
            }
            html += `<h3 style="margin-bottom:1rem;">📋 辩题表决</h3>`;
            (appData.topics || []).forEach(t => {
                if(t.title) {
                    html += `<div style="margin-bottom: 1.5rem; background: #f1f5f9; padding: 1rem; border-radius: 0.5rem;">
                        <p style="font-weight:bold; margin-bottom:0.8rem;">${t.title}</p>
                        <label style="display:inline-block; margin-right:1rem;"><input type="radio" name="${t.id}" value="agree"> 赞成</label>
                        <label style="display:inline-block; margin-right:1rem;"><input type="radio" name="${t.id}" value="disagree"> 反对</label>
                        <label style="display:inline-block;"><input type="radio" name="${t.id}" value="abstain"> 弃权</label>
                    </div>`;
                }
            });
            html += `<button onclick="submitTopicVotes()">确认表决</button>`;
        }

        content.innerHTML = html;
    }

    function getRadioValue(name) {
        const ele = document.querySelector(`input[name="${name}"]:checked`);
        return ele ? ele.value : null;
    }

    async function submitVote(voteType, value) {
        if (!value) return alert("❗️ 请先选择一项才能提交！");
        const btn = document.querySelector("#dynamicContent button");
        btn.innerText = "提交中..."; btn.disabled = true;

        const res = await requestWithFallback('GET');
        if (res.success && res.data) {
            appData = res.data;
            if (!appData[voteType]) appData[voteType] = {};
            appData[voteType][currentUser] = value;
            
            const putRes = await requestWithFallback('PUT', appData);
            if (putRes.success) renderVotingUI();
            else { alert("❗️ 提交失败，请重试"); btn.innerText = "确认投票"; btn.disabled = false; }
        }
    }

    async function submitTopicVotes() {
        const btn = document.querySelector("#dynamicContent button");
        btn.innerText = "提交中..."; btn.disabled = true;
        
        const res = await requestWithFallback('GET');
        if (res.success && res.data) {
            appData = res.data;
            if (!appData.topicVotes) appData.topicVotes = {};
            
            (appData.topics || []).forEach(t => {
                if(!t.title) return;
                const val = getRadioValue(t.id);
                if (val) {
                    if(!appData.topicVotes[t.id]) appData.topicVotes[t.id] = {};
                    appData.topicVotes[t.id][currentUser] = val;
                }
            });
            
            const putRes = await requestWithFallback('PUT', appData);
            if (putRes.success) renderVotingUI();
            else { alert("❗️ 提交失败，请重试"); btn.innerText = "确认表决"; btn.disabled = false; }
        }
    }

    async function poll() {
        const res = await requestWithFallback('GET');
        if (res.success && res.data) {
            if (appData.phase !== res.data.phase) {
                appData = res.data;
                renderVotingUI();
            }
        }
    }

    function startPolling() {
        if (syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(poll, 3000);
    }

    window.onload = () => {
        document.getElementById("loginSection").classList.remove("hidden");
    };
</script>
</body>
</html>
