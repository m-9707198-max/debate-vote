<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辩论赛投票系统 - 管理员控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            padding: 1rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 2rem; color: #0f172a; }
        .card {
            background: white; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
        .card-header h2 { font-size: 1.25rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        label { font-weight: 600; width: 80px; color: #475569; font-size: 0.9rem;}
        input[type="text"] {
            flex: 1; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 0.375rem; font-size: 0.95rem;
        }
        input:disabled { background: #f8fafc; color: #64748b; cursor: not-allowed; }
        button {
            padding: 0.5rem 1rem; border: none; border-radius: 0.375rem; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: all 0.2s;
        }
        .btn-edit { background: #eab308; color: white; }
        .btn-edit:hover { background: #ca8a04; }
        .btn-save { background: #22c55e; color: white; }
        .btn-save:hover { background: #16a34a; }
        .btn-send { background: #3b82f6; color: white; width: 100%; padding: 0.75rem; font-size: 1.1rem; margin-top: 1rem;}
        .btn-send:hover { background: #2563eb; }
        .btn-end { background: #ef4444; color: white; width: 100%; padding: 0.75rem; font-size: 1.1rem; margin-top: 1rem;}
        .btn-end:hover { background: #dc2626; }
        .status-badge { padding: 0.3rem 0.8rem; border-radius: 999px; font-size: 0.85rem; font-weight: bold; }
        .status-active { background: #dcfce7; color: #16a34a; }
        .status-wait { background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ 辩论赛中央控制台</h1>

    <div class="card" style="text-align: center;">
        <h2>当前观众端状态：<span id="currentPhaseDisplay" class="status-badge status-wait">获取中...</span></h2>
        <button class="btn-end" onclick="sendVotePhase('waiting')">🛑 结束所有投票 (强制观众端进入等待界面)</button>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>🏆 最佳辩手 (8个席位)</h2>
            <div>
                <button id="editDebatersBtn" class="btn-edit" onclick="toggleEdit('debaters')">修改名单</button>
                <button id="saveDebatersBtn" class="btn-save" style="display:none;" onclick="saveDebaters()">保存名单</button>
            </div>
        </div>
        <div class="grid-2" id="debatersGrid">
            </div>
        <button class="btn-send" onclick="sendVotePhase('debateVoting')">🚀 发布【最佳辩手投票】</button>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>📋 辩题设置</h2>
            <div>
                <button id="editTopicBtn" class="btn-edit" onclick="toggleEdit('topic')">修改辩题</button>
                <button id="saveTopicBtn" class="btn-save" style="display:none;" onclick="saveTopic()">保存辩题</button>
            </div>
        </div>
        <div class="form-group" style="margin-top: 1rem;">
            <label style="width: 50px;">辩题</label>
            <input type="text" id="topicInput" disabled placeholder="例如：AI是否会取代人类？">
        </div>
        <button class="btn-send" onclick="sendVotePhase('topicVoting')">🚀 发布【辩题投票】</button>
    </div>

</div>

<script>
    const API_CONFIGS = [
        { apiKey: "$2a$10$J.nzDSD1igPJF/7QuiBE8.W8N/6O3wwPYi3dvNZ5xTO3tfu9XP.ZC", binId: "69c6e9f0aa77b81da9286fee" },
        { apiKey: "$2a$10$KFcTvvnVuwIivhUsGq8.z.pmXNh4Z9v/CkRxBRwj9zG2JebPaBcg6", binId: "69c6fdadc3097a1dd569be7c" }
    ];

    // 默认数据结构，包含正反方共8个席位
    let appData = {
        phase: "waiting",
        positions: [
            { key: "pro_1", label: "正方一辩", name: "" },
            { key: "pro_2", label: "正方二辩", name: "" },
            { key: "pro_3", label: "正方三辩", name: "" },
            { key: "pro_4", label: "正方四辩", name: "" },
            { key: "con_1", label: "反方一辩", name: "" },
            { key: "con_2", label: "反方二辩", name: "" },
            { key: "con_3", label: "反方三辩", name: "" },
            { key: "con_4", label: "反方四辩", name: "" }
        ],
        topics: [ { id: "t1", title: "" } ],
        debateVotes: {}, pkVotes: {}, topicVotes: {}, winnerVotes: {}
    };

    // ========== API 请求工具 ==========
    async function requestWithFallback(method, data = null) {
        for (let cfg of API_CONFIGS) {
            try {
                if (method === 'GET') {
                    const resp = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, { headers: { 'X-Master-Key': cfg.apiKey } });
                    if (resp.ok) return { success: true, data: (await resp.json()).record };
                } else {
                    const resp = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': cfg.apiKey },
                        body: JSON.stringify(data)
                    });
                    if (resp.ok) return { success: true };
                }
            } catch(e) { console.warn("API 切换备用节点中...", e); }
        }
        return { success: false };
    }

    // ========== 初始化与渲染 ==========
    async function initAdmin() {
        const res = await requestWithFallback('GET');
        if (res.success && res.data) {
            appData = { ...appData, ...res.data };
            // 兼容旧数据：如果原来只有4个位置，强制补齐8个
            if (!appData.positions || appData.positions.length < 8) {
                appData.positions = [
                    { key: "pro_1", label: "正方一辩", name: "" }, { key: "pro_2", label: "正方二辩", name: "" },
                    { key: "pro_3", label: "正方三辩", name: "" }, { key: "pro_4", label: "正方四辩", name: "" },
                    { key: "con_1", label: "反方一辩", name: "" }, { key: "con_2", label: "反方二辩", name: "" },
                    { key: "con_3", label: "反方三辩", name: "" }, { key: "con_4", label: "反方四辩", name: "" }
                ];
            }
        }
        renderUI();
    }

    function renderUI() {
        // 渲染 8 个辩手输入框
        const grid = document.getElementById("debatersGrid");
        grid.innerHTML = appData.positions.map(p => `
            <div class="form-group">
                <label>${p.label}</label>
                <input type="text" id="input_${p.key}" class="debater-input" value="${p.name || ''}" disabled placeholder="输入姓名">
            </div>
        `).join('');

        // 渲染辩题
        if (appData.topics && appData.topics.length > 0) {
            document.getElementById("topicInput").value = appData.topics[0].title || '';
        }

        // 渲染当前状态
        const phaseMap = {
            'waiting': '🔵 等待中 (观众无法操作)',
            'debateVoting': '🟢 最佳辩手投票 进行中',
            'topicVoting': '🟢 辩题投票 进行中'
        };
        const display = document.getElementById("currentPhaseDisplay");
        display.innerText = phaseMap[appData.phase] || appData.phase;
        display.className = appData.phase === 'waiting' ? 'status-badge status-wait' : 'status-badge status-active';
    }

    // ========== 交互逻辑：修改与保存 ==========
    function toggleEdit(type) {
        if (type === 'debaters') {
            document.querySelectorAll('.debater-input').forEach(input => input.disabled = false);
            document.getElementById("editDebatersBtn").style.display = "none";
            document.getElementById("saveDebatersBtn").style.display = "inline-block";
        } else if (type === 'topic') {
            document.getElementById("topicInput").disabled = false;
            document.getElementById("topicInput").focus();
            document.getElementById("editTopicBtn").style.display = "none";
            document.getElementById("saveTopicBtn").style.display = "inline-block";
        }
    }

    async function saveDebaters() {
        document.getElementById("saveDebatersBtn").innerText = "保存中...";
        appData.positions.forEach(p => {
            p.name = document.getElementById(`input_${p.key}`).value.trim();
        });
        
        const res = await requestWithFallback('PUT', appData);
        if (res.success) {
            document.querySelectorAll('.debater-input').forEach(input => input.disabled = true);
            document.getElementById("editDebatersBtn").style.display = "inline-block";
            document.getElementById("saveDebatersBtn").style.display = "none";
            document.getElementById("saveDebatersBtn").innerText = "保存名单";
            alert("✅ 辩手名单保存成功！");
        } else {
            alert("❌ 保存失败，请重试！");
            document.getElementById("saveDebatersBtn").innerText = "保存名单";
        }
    }

    async function saveTopic() {
        document.getElementById("saveTopicBtn").innerText = "保存中...";
        const newTitle = document.getElementById("topicInput").value.trim();
        if (appData.topics.length === 0) appData.topics = [{ id: "t1", title: "" }];
        appData.topics[0].title = newTitle;

        const res = await requestWithFallback('PUT', appData);
        if (res.success) {
            document.getElementById("topicInput").disabled = true;
            document.getElementById("editTopicBtn").style.display = "inline-block";
            document.getElementById("saveTopicBtn").style.display = "none";
            document.getElementById("saveTopicBtn").innerText = "保存辩题";
            alert("✅ 辩题保存成功！");
        } else {
            alert("❌ 保存失败，请重试！");
            document.getElementById("saveTopicBtn").innerText = "保存辩题";
        }
    }

    // ========== 发送 / 结束投票核心逻辑 ==========
    async function sendVotePhase(newPhase) {
        if (newPhase !== 'waiting' && !confirm(`确定要向观众发送【${newPhase === 'debateVoting' ? '最佳辩手' : '辩题'}投票】吗？`)) return;
        
        const oldPhase = appData.phase;
        appData.phase = newPhase;
        
        const res = await requestWithFallback('PUT', appData);
        if (res.success) {
            renderUI();
            if (newPhase === 'waiting') {
                alert("🛑 已结束投票！观众端现已退回等待页面。");
            } else {
                alert("🚀 投票已发布！观众端将在几秒内自动刷新并显示投票界面。");
            }
        } else {
            appData.phase = oldPhase; // 失败则回滚
            alert("❌ 状态切换失败，请检查网络后重试。");
        }
    }

    // 页面加载即初始化
    initAdmin();
</script>
</body>
</html>
