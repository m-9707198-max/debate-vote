<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辩论赛投票 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #1e293b; padding: 1rem; }
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .container { grid-template-columns: 2fr 1fr; } }
        
        .card { background: white; border-radius: 1rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { font-size: 1.4rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        
        .status-badge { padding: 0.4rem 0.8rem; border-radius: 2rem; font-size: 0.9rem; font-weight: bold; }
        .status-waiting { background: #fef3c7; color: #d97706; }
        .status-active { background: #dcfce3; color: #166534; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.8rem; margin-bottom: 1.5rem; }
        button { padding: 0.8rem; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: 0.2s; color: white; }
        .btn-primary { background: #3b82f6; } .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; } .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; } .btn-warning:hover { background: #d97706; }
        .btn-stop { background: #64748b; font-size: 1.1rem; grid-column: 1 / -1; padding: 1rem; } .btn-stop:hover { background: #475569; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; color: #475569; }
        input[type="text"], textarea { width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 0.4rem; font-family: inherit; }
        textarea { resize: vertical; min-height: 80px; }
        
        .result-section { margin-bottom: 1.5rem; background: #f8fafc; padding: 1rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; }
        .result-title { font-weight: bold; margin-bottom: 0.8rem; color: #0f172a; }
        .bar-container { background: #e2e8f0; border-radius: 1rem; overflow: hidden; height: 1.5rem; position: relative; margin-bottom: 0.5rem; }
        .bar-fill { background: #3b82f6; height: 100%; transition: width 0.5s ease; }
        .bar-label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 0.2rem; }
        .voter-names { font-size: 0.8rem; color: #64748b; margin-bottom: 1rem; margin-top: 0.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-panel">
        <div class="card" style="margin-bottom: 1.5rem;">
            <h2>
                🚦 投票控制台
                <div>
                    <span id="apiStatusBadge" style="font-size: 0.8rem; color: #64748b; margin-right: 10px;">⚪ API未连接</span>
                    <span id="currentStatusBadge" class="status-badge status-waiting">正在连接...</span>
                </div>
            </h2>
            
            <div class="btn-grid">
                <button class="btn-primary" onclick="setPhase('debateVoting')">🏆 开启最佳辩手投票</button>
                <button class="btn-primary" onclick="setPhase('topicVoting')">📋 开启辩题投票</button>
                <button class="btn-primary" onclick="setPhase('winnerVoting')">🏅 开启胜方投票</button>
                <button class="btn-warning" onclick="setPhase('pkVoting')">⚔️ 开启平票加赛(PK)</button>
                
                <button class="btn-stop" onclick="setPhase('waiting')">🛑 结束当前投票 (观众端进入等待界面)</button>
            </div>
            
            <div style="text-align: right;">
                <button class="btn-danger" style="padding: 0.5rem 1rem;" onclick="resetAllVotes()">🗑️ 清空所有票数</button>
            </div>
        </div>

        <div class="card">
            <h2>📊 实时投票结果 <small style="font-size: 0.8rem; color: #64748b; font-weight: normal;">(自动刷新)</small></h2>
            <div id="resultsContainer">
                <p style="color: #64748b; text-align: center; padding: 2rem;">暂无数据...</p>
            </div>
        </div>
    </div>

    <div class="settings-panel">
        <div class="card">
            <h2>⚙️ 赛前配置区</h2>
            <p style="font-size: 0.85rem; color: #dc2626; margin-bottom: 1rem;">注意：修改配置后请点击底部保存按钮。</p>
            
            <div class="form-group">
                <label>👥 投票白名单 (每行一个姓名，留空则全员可投)</label>
                <textarea id="cfgAllowedVoters" placeholder="张三&#10;李四&#10;王五"></textarea>
            </div>

            <div class="form-group">
                <label>⚔️ 平票加赛辩手配置 (勾选进入PK)</label>
                <div id="pkCandidateCheckboxes" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.9rem;"></div>
            </div>

            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 1.5rem 0;">

            <label>🎙️ 辩手姓名配置</label>
            <div id="debaterInputs"></div>

            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 1.5rem 0;">

            <div class="form-group">
                <label>📋 辩题配置 (每行一个辩题)</label>
                <textarea id="cfgTopics" placeholder="例如：AI是否会取代人类"></textarea>
            </div>

            <button class="btn-primary" style="width: 100%; margin-top: 1rem;" onclick="saveConfig()">💾 保存所有配置</button>
        </div>
    </div>
</div>

<script>
    // 你的原版 API
    const API_CONFIGS = [
        { apiKey: "$2a$10$J.nzDSD1igPJF/7QuiBE8.W8N/6O3wwPYi3dvNZ5xTO3tfu9XP.ZC", binId: "69c6e9f0aa77b81da9286fee" },
        { apiKey: "$2a$10$KFcTvvnVuwIivhUsGq8.z.pmXNh4Z9v/CkRxBRwj9zG2JebPaBcg6", binId: "69c6fdadc3097a1dd569be7c" }
    ];

    const DEFAULT_POSITIONS = [
        { key: "正方一辩", label: "正方一辩", name: "" }, { key: "正方二辩", label: "正方二辩", name: "" },
        { key: "正方三辩", label: "正方三辩", name: "" }, { key: "正方四辩", label: "正方四辩", name: "" },
        { key: "反方一辩", label: "反方一辩", name: "" }, { key: "反方二辩", label: "反方二辩", name: "" },
        { key: "反方三辩", label: "反方三辩", name: "" }, { key: "反方四辩", label: "反方四辩", name: "" }
    ];

    let appData = { phase: "waiting", positions: JSON.parse(JSON.stringify(DEFAULT_POSITIONS)), debateVotes: {}, pkVotes: {}, topics: [], topicVotes: {}, tieCandidates: [], allowedVoters: [], winnerVotes: {} };
    let isSaving = false;
    let syncTimer = null;

    async function requestWithFallback(method, data = null) {
        for (let cfg of API_CONFIGS) {
            try {
                if (method === 'GET') {
                    const resp = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, { headers: { 'X-Master-Key': cfg.apiKey } });
                    if (resp.ok) { 
                        document.getElementById('apiStatusBadge').innerText = "🟢 API正常"; 
                        return { success: true, data: (await resp.json()).record }; 
                    }
                } else {
                    const resp = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': cfg.apiKey }, body: JSON.stringify(data) });
                    if (resp.ok) {
                        document.getElementById('apiStatusBadge').innerText = "🟢 API正常";
                        return { success: true };
                    }
                }
            } catch(e) {}
        }
        document.getElementById('apiStatusBadge').innerText = "🔴 API断开";
        return { success: false };
    }

    // ====== 修改点：这里增加了平票检测逻辑 ======
    async function setPhase(newPhase) {
        if (isSaving) return;
        
        // 当在最佳辩手投票结束时（点停止按钮转入waiting），检测是否平票
        if (newPhase === 'waiting' && appData.phase === 'debateVoting') {
            const voteCounts = {};
            Object.values(appData.debateVotes || {}).forEach(v => {
                voteCounts[v] = (voteCounts[v] || 0) + 1;
            });
            
            let maxVotes = 0;
            for (let key in voteCounts) { if (voteCounts[key] > maxVotes) maxVotes = voteCounts[key]; }
            
            const tiedKeys = Object.keys(voteCounts).filter(k => voteCounts[k] === maxVotes);
            
            // 如果最高票的人数大于1，说明平票了
            if (maxVotes > 0 && tiedKeys.length > 1) {
                const tiedNames = tiedKeys.map(k => {
                    const p = appData.positions.find(pos => pos.key === k);
                    return p ? p.label + (p.name ? '('+p.name+')' : '') : k;
                }).join(" 和 ");
                
                const wantPK = confirm(`⚠️ 系统检测到平票！\n${tiedNames} 均获得最高票 ${maxVotes} 票。\n\n是否立即自动将这 ${tiedKeys.length} 人加入PK名单，并开启【平票加赛(PK)】？\n\n(点击"取消"则正常结束进入等待界面)`);
                if (wantPK) {
                    appData.tieCandidates = tiedKeys; // 自动勾选这几个人进入PK
                    newPhase = 'pkVoting'; // 直接将下一步状态改为开启PK
                }
            }
        }
        
        // 原有确认逻辑
        if (!confirm(`确定要将系统状态切换为: ${newPhase} 吗？`)) return;
        
        isSaving = true;
        appData.phase = newPhase;
        const res = await requestWithFallback('PUT', appData);
        if (res.success) {
            alert("✅ 状态切换成功！");
            updateStatusBadge();
            initConfigForm(); // 刷新勾选框
            renderResults();
        } else { alert("❌ 切换失败。"); }
        isSaving = false;
    }

    async function resetAllVotes() {
        if (!confirm("⚠️ 确定要清空所有投票数据吗？")) return;
        isSaving = true;
        appData.debateVotes = {}; appData.pkVotes = {}; appData.topicVotes = {}; appData.winnerVotes = {};
        const res = await requestWithFallback('PUT', appData);
        if (res.success) { alert("✅ 票数已清空！"); renderResults(); }
        isSaving = false;
    }

    function updateStatusBadge() {
        const badge = document.getElementById("currentStatusBadge");
        if (appData.phase === "waiting") { badge.className = "status-badge status-waiting"; badge.innerText = "⏸️ 投票已暂停 / 等待中"; }
        else { badge.className = "status-badge status-active"; badge.innerText = `▶️ 正在进行: ${appData.phase} 投票`; }
    }

    function buildBar(label, count, totalCount) {
        const pct = totalCount === 0 ? 0 : Math.round((count / totalCount) * 100);
        return `<div class="bar-label"><span>${label}</span><span>${count} 票 (${pct}%)</span></div>
                <div class="bar-container"><div class="bar-fill" style="width: ${pct}%;"></div></div>`;
    }

    // ====== 恢复点：全部补回投票人姓名的显示 ======
    function renderResults() {
        const container = document.getElementById("resultsContainer");
        let html = "";

        const debateTotal = Object.keys(appData.debateVotes || {}).length;
        if (debateTotal > 0 || appData.phase === 'debateVoting') {
            html += `<div class="result-section"><div class="result-title">🏆 辩手得票 (当前: ${debateTotal} 人已投)</div>`;
            appData.positions.forEach(pos => {
                if (!pos.name) return;
                let voters = [];
                Object.entries(appData.debateVotes || {}).forEach(([voter, v]) => { if(v === pos.key) voters.push(voter); });
                html += buildBar(`${pos.label} - ${pos.name}`, voters.length, debateTotal);
                if (voters.length > 0) html += `<div class="voter-names">👥 投票人: ${voters.join(', ')}</div>`;
            });
            html += `</div>`;
        }

        const pkTotal = Object.keys(appData.pkVotes || {}).length;
        if (pkTotal > 0 || appData.phase === 'pkVoting') {
            html += `<div class="result-section"><div class="result-title" style="color:#d97706;">⚔️ PK加赛得票 (当前: ${pkTotal} 人已投)</div>`;
            (appData.tieCandidates || []).forEach(candKey => {
                const pos = appData.positions.find(p => p.key === candKey);
                if(!pos) return;
                let voters = [];
                Object.entries(appData.pkVotes || {}).forEach(([voter, v]) => { if(v === candKey) voters.push(voter); });
                html += buildBar(`${pos.label} - ${pos.name}`, voters.length, pkTotal);
                if (voters.length > 0) html += `<div class="voter-names">👥 投票人: ${voters.join(', ')}</div>`;
            });
            html += `</div>`;
        }

        if ((appData.topics || []).length > 0 && (Object.keys(appData.topicVotes || {}).length > 0 || appData.phase === 'topicVoting')) {
            html += `<div class="result-section"><div class="result-title">📋 辩题表决情况</div>`;
            (appData.topics || []).forEach(t => {
                if(!t.title) return;
                const votes = appData.topicVotes[t.id] || {};
                const tTotal = Object.keys(votes).length;
                let agree = [], disagree = [], abstain = [];
                Object.entries(votes).forEach(([voter, v]) => {
                    if (v === 'agree') agree.push(voter); else if (v === 'disagree') disagree.push(voter); else if (v === 'abstain') abstain.push(voter);
                });
                html += `<div style="margin-bottom: 1rem; border-left: 3px solid #cbd5e1; padding-left: 0.8rem;">
                    <div style="font-weight:600; font-size:0.9rem; margin-bottom:0.5rem;">${t.title} (共${tTotal}票)</div>
                    ${buildBar('赞成', agree.length, tTotal)}
                    ${agree.length > 0 ? `<div class="voter-names">👥: ${agree.join(', ')}</div>` : ''}
                    ${buildBar('反对', disagree.length, tTotal)}
                    ${disagree.length > 0 ? `<div class="voter-names">👥: ${disagree.join(', ')}</div>` : ''}
                    ${buildBar('弃权', abstain.length, tTotal)}
                    ${abstain.length > 0 ? `<div class="voter-names">👥: ${abstain.join(', ')}</div>` : ''}
                </div>`;
            });
            html += `</div>`;
        }

        const winnerTotal = Object.keys(appData.winnerVotes || {}).length;
        if (winnerTotal > 0 || appData.phase === 'winnerVoting') {
            let proVoters = [], conVoters = [];
            Object.entries(appData.winnerVotes || {}).forEach(([voter, v]) => { if(v === 'pro') proVoters.push(voter); else if(v === 'con') conVoters.push(voter); });
            html += `<div class="result-section"><div class="result-title">🏅 胜负投票 (当前: ${winnerTotal} 人已投)</div>`;
            html += buildBar('正方 胜', proVoters.length, winnerTotal);
            if (proVoters.length > 0) html += `<div class="voter-names">👥 正方支持者: ${proVoters.join(', ')}</div>`;
            html += buildBar('反方 胜', conVoters.length, winnerTotal);
            if (conVoters.length > 0) html += `<div class="voter-names">👥 反方支持者: ${conVoters.join(', ')}</div>`;
            html += `</div>`;
        }

        container.innerHTML = html || `<p style="color: #64748b; text-align: center; padding: 2rem;">当前无投票数据...</p>`;
    }

    function initConfigForm() {
        document.getElementById("cfgAllowedVoters").value = (appData.allowedVoters || []).join("\n");
        document.getElementById("cfgTopics").value = (appData.topics || []).map(t => t.title).filter(Boolean).join("\n");
        const debContainer = document.getElementById("debaterInputs"); debContainer.innerHTML = "";
        const cksContainer = document.getElementById("pkCandidateCheckboxes"); cksContainer.innerHTML = "";

        appData.positions.forEach((pos, index) => {
            debContainer.innerHTML += `<div class="form-group" style="margin-bottom: 0.5rem;">
                <div style="display:flex; align-items:center; gap:0.5rem;">
                    <span style="font-size:0.85rem; width:70px; color:#475569;">${pos.label}</span>
                    <input type="text" id="pos_${index}" value="${pos.name || ''}" placeholder="输入姓名..." style="padding:0.4rem;">
                </div></div>`;
            const isChecked = (appData.tieCandidates || []).includes(pos.key) ? "checked" : "";
            cksContainer.innerHTML += `<label style="font-weight:normal;">
                <input type="checkbox" value="${pos.key}" class="pk-checkbox" ${isChecked}> ${pos.label} ${pos.name ? '('+pos.name+')' : ''}</label>`;
        });
    }

    async function saveConfig() {
        if (isSaving) return;
        isSaving = true;
        const btn = document.querySelector(".settings-panel .btn-primary"); btn.innerText = "保存中...";
        try {
            appData.allowedVoters = document.getElementById("cfgAllowedVoters").value.split('\n').map(s => s.trim()).filter(Boolean);
            appData.positions.forEach((pos, index) => { pos.name = document.getElementById(`pos_${index}`).value.trim(); });
            const topicLines = document.getElementById("cfgTopics").value.split('\n').map(s => s.trim()).filter(Boolean);
            appData.topics = topicLines.map((t, idx) => ({ id: `t${idx+1}`, title: t }));
            appData.tieCandidates = Array.from(document.querySelectorAll('.pk-checkbox:checked')).map(cb => cb.value);

            const res = await requestWithFallback('PUT', appData);
            if (res.success) { alert("✅ 配置保存成功！"); initConfigForm(); renderResults(); }
        } finally { isSaving = false; btn.innerText = "💾 保存所有配置"; }
    }

    async function adminAutoSync() {
        if (!isSaving) {
            try {
                const res = await requestWithFallback('GET');
                if (res.success && res.data) {
                    appData.phase = res.data.phase || "waiting";
                    appData.debateVotes = res.data.debateVotes || {};
                    appData.pkVotes = res.data.pkVotes || {};
                    appData.topicVotes = res.data.topicVotes || {};
                    appData.winnerVotes = res.data.winnerVotes || {};
                    updateStatusBadge(); renderResults();
                }
            } catch(e) {}
        }
        syncTimer = setTimeout(adminAutoSync, 3000);
    }

    window.onload = async () => {
        const res = await requestWithFallback('GET');
        if (res.success && res.data) {
            appData = { ...appData, ...res.data };
            ["topicVotes", "debateVotes", "pkVotes", "winnerVotes"].forEach(k => appData[k] = appData[k] || {});
            ["allowedVoters", "positions", "topics", "tieCandidates"].forEach(k => appData[k] = appData[k] || []);
            if(appData.positions.length === 0) appData.positions = JSON.parse(JSON.stringify(DEFAULT_POSITIONS));
        }
        initConfigForm(); updateStatusBadge(); renderResults(); adminAutoSync();
    };
</script>
</body>
</html>
