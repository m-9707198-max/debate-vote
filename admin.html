<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 辩论赛</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #e2e8f0; padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; margin-bottom: 20px; }
        .section { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 4px; }
        textarea { height: 100px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; display: inline-block; }
        .btn-red { background: #ef4444; }
        .btn-green { background: #10b981; }
        .status-bar { background: #1e293b; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        .result-box { background: #fff; border: 1px solid #ccc; padding: 10px; margin-top: 10px; border-radius: 4px; white-space: pre-wrap;}
    </style>
</head>
<body>

<div class="container">
    <h1>🛠️ 投票管理后台</h1>
    
    <div class="status-bar">
        <div>当前观众端状态: <strong id="currentPhaseLabel" style="color:#fbbf24;">读取中...</strong></div>
        <button class="btn btn-red" onclick="endAllVotes()" style="margin:0;">⏹ 结束/收回投票</button>
    </div>

    <div class="section">
        <h2>👥 1. 观众白名单设置</h2>
        <p style="font-size: 0.9em; color: #64748b;">每行输入一个名字。只有名单里的人才能投票。（如果留空，则所有人都能投）</p>
        <textarea id="voterListInput" placeholder="张三&#10;李四&#10;王五"></textarea>
        <button class="btn" onclick="saveVoters()">💾 保存名单</button>
    </div>

    <div class="section">
        <h2>🗣️ 2. 最佳辩手配置 & 开启投票</h2>
        <div><label>正方一辩:</label><input type="text" id="pos1"></div>
        <div><label>正方二辩:</label><input type="text" id="pos2"></div>
        <div><label>反方一辩:</label><input type="text" id="pos3"></div>
        <div><label>反方二辩:</label><input type="text" id="pos4"></div>
        <button class="btn btn-green" onclick="startDebateVote()">▶️ 保存辩手并开启 [最佳辩手] 投票</button>
        <div class="result-box" id="debateResult">票数实时结果将显示在这里...</div>
    </div>

    <div class="section">
        <h2>⚔️ 3. 平票 PK 投票 (仅当平票时使用)</h2>
        <p style="font-size: 0.9em; color: #64748b;">请勾选需要进入PK的辩手：</p>
        <div id="pkSelectionArea" style="margin: 10px 0;">(请先保存辩手名单)</div>
        <button class="btn btn-green" onclick="startPKVote()">▶️ 开启 [PK决胜] 投票</button>
        <div class="result-box" id="pkResult">PK票数结果...</div>
    </div>

    <div class="section">
        <h2>📋 4. 辩题配置 & 开启投票</h2>
        <div><label>辩题 1:</label><input type="text" id="topic1"></div>
        <div><label>辩题 2:</label><input type="text" id="topic2"></div>
        <button class="btn btn-green" onclick="startTopicVote()">▶️ 保存辩题并开启 [辩题] 投票</button>
        <div class="result-box" id="topicResult">辩题票数结果...</div>
    </div>

    <div class="section" style="border-color: #ef4444;">
        <h2>⚠️ 危险操作</h2>
        <button class="btn btn-red" onclick="resetAllData()">🗑️ 清空所有票数和数据 (新比赛使用)</button>
    </div>
</div>

<script>
    // 保持和 index.html 一致的双 API Key
    const API_CONFIGS = [
        { apiKey: "$2a$10$J.nzDSD1igPJF/7QuiBE8.W8N/6O3wwPYi3dvNZ5xTO3tfu9XP.ZC", binId: "69c6e9f0aa77b81da9286fee" },
        { apiKey: "$2a$10$KFcTvvnVuwIivhUsGq8.z.pmXNh4Z9v/CkRxBRwj9zG2JebPaBcg6", binId: "69c6fdadc3097a1dd569be7c" }
    ];

    let appData = { phase: "waiting", positions: [], debateVotes: {}, pkVotes: {}, topics: [], topicVotes: {}, tieCandidates: [], allowedVoters: [] };

    async function requestWithFallback(method, data = null) {
        for (let i = 0; i < API_CONFIGS.length; i++) {
            const cfg = API_CONFIGS[i];
            const url = `https://api.jsonbin.io/v3/b/${cfg.binId}/latest`;
            try {
                if (method === 'GET') {
                    const resp = await fetch(url, { headers: { 'X-Master-Key': cfg.apiKey } });
                    if (resp.ok) { const result = await resp.json(); return { success: true, data: result.record }; }
                } else if (method === 'PUT') {
                    const resp = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': cfg.apiKey }, body: JSON.stringify(data)
                    });
                    if (resp.ok) return { success: true };
                }
            } catch (e) { console.error("API请求报错", e); }
        }
        return { success: false };
    }

    async function loadData() {
        const result = await requestWithFallback('GET');
        if (result.success) { appData = { ...appData, ...result.data }; renderAdminUI(); }
    }

    async function pushToRemote() {
        document.getElementById("currentPhaseLabel").innerText = "正在同步到云端...";
        const result = await requestWithFallback('PUT', appData);
        if (result.success) renderAdminUI();
        else alert("同步失败，请检查网络或额度！");
    }

    // --- 核心控制逻辑 ---

    // 结束/收回所有投票 (痛点3核心逻辑)
    async function endAllVotes() {
        if(confirm("确定要收回投票界面吗？大众端将变回等待画面。")) {
            appData.phase = "waiting";
            await pushToRemote();
            alert("已成功收回投票！");
        }
    }

    async function saveVoters() {
        const text = document.getElementById("voterListInput").value;
        appData.allowedVoters = text.split('\n').map(n => n.trim()).filter(n => n);
        await pushToRemote();
        alert("名单保存成功！");
    }

    async function startDebateVote() {
        appData.positions = [
            { key: "p1", label: "正方一辩", name: document.getElementById("pos1").value },
            { key: "p2", label: "正方二辩", name: document.getElementById("pos2").value },
            { key: "p3", label: "反方一辩", name: document.getElementById("pos3").value },
            { key: "p4", label: "反方二辩", name: document.getElementById("pos4").value }
        ];
        appData.phase = "debateVoting";
        await pushToRemote();
    }

    async function startPKVote() {
        const checkboxes = document.querySelectorAll('.pk-check:checked');
        appData.tieCandidates = Array.from(checkboxes).map(cb => cb.value);
        if (appData.tieCandidates.length < 2) return alert("请至少勾选2名辩手进行PK！");
        appData.phase = "pkVoting";
        await pushToRemote();
    }

    async function startTopicVote() {
        appData.topics = [
            { id: "t1", title: document.getElementById("topic1").value },
            { id: "t2", title: document.getElementById("topic2").value }
        ].filter(t => t.title.trim() !== "");
        if (appData.topics.length === 0) return alert("至少输入一个辩题");
        appData.phase = "topicVoting";
        await pushToRemote();
    }

    async function resetAllData() {
        if (confirm("⚠️ 警告：这将清空所有历史投票记录和当前状态！仅在准备下一场新比赛时使用。")) {
            appData = { phase: "waiting", positions: [], debateVotes: {}, pkVotes: {}, topics: [], topicVotes: {}, tieCandidates: [], allowedVoters: [] };
            await pushToRemote();
            alert("数据已清空，系统焕然一新！");
        }
    }

    // --- 界面渲染逻辑 ---
    function renderAdminUI() {
        // 状态文本映射
        const phaseMap = { "waiting": "⏳ 等待中 (未开启投票)", "debateVoting": "🏆 最佳辩手投票中...", "pkVoting": "⚔️ PK投票中...", "topicVoting": "📋 辩题投票中..." };
        document.getElementById("currentPhaseLabel").innerText = phaseMap[appData.phase] || appData.phase;

        // 填充输入框
        document.getElementById("voterListInput").value = (appData.allowedVoters || []).join('\n');
        (appData.positions || []).forEach(p => {
            if (p.key === "p1") document.getElementById("pos1").value = p.name;
            if (p.key === "p2") document.getElementById("pos2").value = p.name;
            if (p.key === "p3") document.getElementById("pos3").value = p.name;
            if (p.key === "p4") document.getElementById("pos4").value = p.name;
        });
        (appData.topics || []).forEach(t => {
            if (t.id === "t1") document.getElementById("topic1").value = t.title;
            if (t.id === "t2") document.getElementById("topic2").value = t.title;
        });

        // 渲染PK复选框
        const pkArea = document.getElementById("pkSelectionArea");
        pkArea.innerHTML = (appData.positions || []).filter(p => p.name).map(p => 
            `<label style="display:inline-block; margin-right:15px; font-weight:normal;">
                <input type="checkbox" class="pk-check" value="${p.key}"> ${p.label} (${p.name})
            </label>`
        ).join('');

        // 统计票数展示
        document.getElementById("debateResult").innerText = formatDebateVotes();
        document.getElementById("pkResult").innerText = formatPKVotes();
        document.getElementById("topicResult").innerText = formatTopicVotes();
    }

    function formatDebateVotes() {
        let counts = {};
        Object.values(appData.debateVotes || {}).forEach(k => counts[k] = (counts[k] || 0) + 1);
        return (appData.positions || []).map(p => `${p.label} (${p.name}): ${counts[p.key] || 0} 票`).join('\n') || "暂无数据";
    }

    function formatPKVotes() {
        let counts = {};
        Object.values(appData.pkVotes || {}).forEach(k => counts[k] = (counts[k] || 0) + 1);
        return (appData.positions || []).map(p => `${p.label} (${p.name}): ${counts[p.key] || 0} 票`).join('\n') || "暂无数据";
    }

    function formatTopicVotes() {
        if (!appData.topics || appData.topics.length === 0) return "暂无辩题数据";
        let res = "";
        appData.topics.forEach(t => {
            let agree = 0, disagree = 0, abstain = 0;
            const votes = appData.topicVotes && appData.topicVotes[t.id] ? appData.topicVotes[t.id] : {};
            Object.values(votes).forEach(v => {
                if (v === 'agree') agree++;
                if (v === 'disagree') disagree++;
                if (v === 'abstain') abstain++;
            });
            res += `【${t.title}】\n赞成: ${agree}票 | 反对: ${disagree}票 | 弃权: ${abstain}票\n\n`;
        });
        return res;
    }

    // 后台页面每5秒自动刷新一次，以便你能实时看到票数涨动
    setInterval(loadData, 5000);
    loadData();
</script>
</body>
</html>
